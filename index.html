<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lexus GS450h Control</title>
    <link rel="manifest" href="manifest.json" crossorigin="use-credentials">
    <link rel="apple-touch-icon" href="icon-lexus.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; min-height: 100vh; padding: 20px; color: white; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 10px 0; }
        .car-icon { width: 50px; height: 50px; background: rgba(255,255,255,0.1); border-radius: 25px; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; transition: all 0.3s; }
        .car-icon img { width: 100%; height: 100%; object-fit: cover; }
        .settings-btn, .image-btn { background: none; border: none; font-size: 28px; cursor: pointer; color: white; opacity: 0.7; margin-left: 10px; }
        .mqtt-form { background: rgba(0,0,0,0.7); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .mqtt-form h3 { margin-bottom: 15px; }
        .mqtt-form input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: none; background: rgba(255,255,255,0.2); color: white; font-size: 16px; }
        .mqtt-form button { background: #0083b0; border: none; padding: 12px; border-radius: 30px; color: white; font-size: 18px; margin-top: 10px; width: 100%; cursor: pointer; }
        .engine-main-btn { width: 100%; padding: 25px; font-size: 28px; font-weight: bold; border: none; border-radius: 40px; margin-bottom: 20px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .engine-main-btn.start { background: linear-gradient(135deg, #00b4db, #0083b0); color: white; }
        .engine-main-btn.stop { background: linear-gradient(135deg, #ff416c, #ff4b2b); color: white; }
        .info-panel, .functions-panel, .history-panel { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .functions-grid { display: flex; flex-direction: column; gap: 10px; }
        .func-btn { background: rgba(255,255,255,0.15); border: none; padding: 12px; border-radius: 30px; color: white; font-size: 16px; text-align: center; cursor: pointer; }
        .expandable-panel { display: none; margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.4); border-radius: 15px; flex-wrap: wrap; gap: 10px; align-items: center; }
        .expandable-panel.active { display: flex; }
        .time-select, .datetime-input { background: rgba(255,255,255,0.2); border: none; padding: 10px; border-radius: 20px; color: white; flex: 1; }
        .action-btn { background: #0083b0; border: none; padding: 10px 15px; border-radius: 20px; color: white; cursor: pointer; }
        .cancel-btn { background: #ff4b2b; margin-left: 10px; }
        .history-list { max-height: 150px; overflow-y: auto; font-size: 12px; font-family: monospace; }
        .history-item { padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #map-container { height: 250px; width: 100%; border-radius: 20px; overflow: hidden; margin-bottom: 20px; background: #1e1e2e; }
        #leaflet-map { height: 100%; width: 100%; }
        .connection-status { text-align: center; font-size: 12px; opacity: 0.7; margin-top: 10px; }
        .timer-display { font-size: 24px; font-weight: bold; text-align: center; font-family: monospace; margin-top: 10px; color: #00b4db; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #1a1a2e; border-radius: 30px; padding: 20px; width: 80%; max-width: 300px; text-align: center; }
        .flex-btns { display: flex; gap: 10px; }
        .schedule-item { background: rgba(0,0,0,0.5); border-radius: 15px; padding: 10px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .schedule-time { font-family: monospace; }
        .schedule-cancel { background: #ff4b2b; border: none; padding: 5px 10px; border-radius: 20px; color: white; cursor: pointer; }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; background: none; border: none; color: white; }
        .modal-title { margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="car-icon" id="carIcon"><img id="carImage" src="car-default.png" alt="Car"></div>
        <h1 style="font-size: 20px;">LEXUS GS450h</h1>
        <div class="flex-btns">
            <button class="image-btn" id="imageBtn">🖼️</button>
            <button class="settings-btn" id="settingsBtn">⚙️</button>
        </div>
    </div>

    <div id="mqttConfigPanel" class="mqtt-form" style="display: none;">
        <h3>Настройки MQTT</h3>
        <input type="text" id="mqttHost" placeholder="Адрес сервера" value="m2.wqtt.ru">
        <input type="text" id="mqttPort" placeholder="Порт" value="19608">
        <input type="text" id="mqttUser" placeholder="Имя пользователя">
        <input type="password" id="mqttPass" placeholder="Пароль">
        <input type="text" id="mqttPrefix" placeholder="Префикс топика" value="lexus">
        <button id="saveMqttBtn">Сохранить и подключиться</button>
    </div>

    <div id="mainInterface" style="display: none;">
        <button class="engine-main-btn start" id="mainEngineBtn">🔥 СТАРТ</button>
        <div id="timerDisplay" class="timer-display" style="display: none;"></div>

        <div class="info-panel">
            <div class="info-row"><span class="info-label">🚗 Статус</span><span class="info-value" id="readyStatus">—</span></div>
            <div class="info-row"><span class="info-label">🔥 Обороты</span><span class="info-value" id="rpm">—</span></div>
            <div class="info-row"><span class="info-label">🌡️ Температура</span><span class="info-value" id="temp">— °C</span></div>
            <div class="info-row"><span class="info-label">📍 Координаты</span><span class="info-value" id="coords">—</span></div>
            <div class="info-row"><span class="info-label">📡 Скорость</span><span class="info-value" id="speed">— км/ч</span></div>
            <div class="info-row"><span class="info-label">🚪 Двери</span><span class="info-value" id="doors">—</span></div>
            <div class="info-row"><span class="info-label">🔒 Охрана</span><span class="info-value" id="securityStatus">—</span></div>
        </div>

        <div class="functions-panel">
            <div class="functions-grid">
                <button class="func-btn" id="btnCloseWindows">🚫 Закрыть окна</button>
                <button class="func-btn" id="btnArmDisarm">🔒 ПОСТАВИТЬ НА ОХРАНУ</button>
                <button class="func-btn" id="btnScheduleToggle">⏰ ЗАПУСК ПО ВРЕМЕНИ</button>
                <button class="func-btn" id="btnWarmupToggle">🌡️ ПРОГРЕВ</button>
            </div>
            <div id="warmupPanel" class="expandable-panel">
                <select id="warmupTime" class="time-select">
                    <option value="5">5 минут</option><option value="10" selected>10 минут</option>
                    <option value="15">15 минут</option><option value="20">20 минут</option>
                    <option value="25">25 минут</option><option value="30">30 минут</option>
                </select>
                <button class="action-btn" id="btnStartWarmup">Запустить прогрев</button>
            </div>
            <div id="scheduleList"></div>
        </div>

        <div class="history-panel">
            <div class="functions-title">📜 История координат</div>
            <div class="history-list" id="historyList"><div class="history-item">Нет данных</div></div>
            <button class="func-btn" id="btnClearHistory" style="margin-top:10px;">🗑️ Очистить</button>
        </div>

        <div id="map-container"></div>
        
        <div class="connection-status" id="connStatus">⚠️ Введите настройки</div>
    </div>
</div>

<div id="scheduleModal" class="modal">
    <div class="modal-content">
        <button class="close-modal" id="closeModalBtn">✕</button>
        <h3 class="modal-title">Запланировать запуск</h3>
        <input type="datetime-local" id="scheduleDateTime" class="datetime-input" style="width: 100%; margin: 10px 0;">
        <button id="confirmScheduleBtn" class="action-btn" style="width: 100%;">Запланировать</button>
    </div>
</div>

<div id="imageModal" class="modal"><div class="modal-content"><h3>Загрузить фото</h3><input type="file" id="imageUpload" accept="image/png, image/jpeg"><button id="saveImageBtn">Сохранить</button><button id="closeModal">Закрыть</button></div></div>

<script src="https://unpkg.com/mqtt@5.0.0/dist/mqtt.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="sw-register.js"></script>
<script>
    // === АНИМАЦИЯ КНОПОК (работает на iOS) ===
    function addButtonAnimation(btn) {
        if (!btn) return;
        btn.addEventListener('touchstart', function() {
            this.style.transform = 'scale(0.97)';
            this.style.transition = 'transform 0.08s ease';
        }, { passive: true });
        btn.addEventListener('touchend', function() {
            this.style.transform = 'scale(1)';
        });
        btn.addEventListener('touchcancel', function() {
            this.style.transform = 'scale(1)';
        });
        btn.addEventListener('mousedown', function() {
            this.style.transform = 'scale(0.97)';
        });
        btn.addEventListener('mouseup', function() {
            this.style.transform = 'scale(1)';
        });
        btn.addEventListener('mouseleave', function() {
            this.style.transform = 'scale(1)';
        });
    }

    // Применяем анимацию ко всем существующим кнопкам
    document.querySelectorAll('button').forEach(btn => addButtonAnimation(btn));

    let client = null;
    let map = null, marker = null;
    let historyCoords = [];
    let lastLat = null, lastLon = null;
    let isEngineRunning = false;
    let isArmed = false;
    let currentPrefix = "lexus";
    let scheduledTimers = [];
    let scheduledItems = [];
    let engineTimer = null;
    let engineStartTime = null;
    let isWarmupMode = false;
    let warmupSeconds = 0;

    // DOM элементы
    const mqttConfigPanel = document.getElementById('mqttConfigPanel');
    const mainInterface = document.getElementById('mainInterface');
    const saveMqttBtn = document.getElementById('saveMqttBtn');
    const mqttHost = document.getElementById('mqttHost');
    const mqttPort = document.getElementById('mqttPort');
    const mqttUser = document.getElementById('mqttUser');
    const mqttPass = document.getElementById('mqttPass');
    const mqttPrefix = document.getElementById('mqttPrefix');
    const connStatusDiv = document.getElementById('connStatus');
    const mainEngineBtn = document.getElementById('mainEngineBtn');
    const btnCloseWindows = document.getElementById('btnCloseWindows');
    const btnArmDisarm = document.getElementById('btnArmDisarm');
    const btnWarmupToggle = document.getElementById('btnWarmupToggle');
    const btnScheduleToggle = document.getElementById('btnScheduleToggle');
    const warmupPanel = document.getElementById('warmupPanel');
    const btnStartWarmup = document.getElementById('btnStartWarmup');
    const warmupTime = document.getElementById('warmupTime');
    const scheduleList = document.getElementById('scheduleList');
    const btnClearHistory = document.getElementById('btnClearHistory');
    const carImage = document.getElementById('carImage');
    const settingsBtn = document.getElementById('settingsBtn');
    const imageBtn = document.getElementById('imageBtn');
    const imageModal = document.getElementById('imageModal');
    const saveImageBtn = document.getElementById('saveImageBtn');
    const closeModal = document.getElementById('closeModal');
    const timerDisplay = document.getElementById('timerDisplay');
    const scheduleModal = document.getElementById('scheduleModal');
    const scheduleDateTime = document.getElementById('scheduleDateTime');
    const confirmScheduleBtn = document.getElementById('confirmScheduleBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');

    // Анимация для динамических кнопок (будет вызываться при создании)
    function animateDynamicButton(btn) {
        addButtonAnimation(btn);
    }

    function formatTime(seconds) {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }

    function startTimer(isWarmup, warmupMin) {
        if (engineTimer) clearInterval(engineTimer);
        engineStartTime = Date.now();
        isWarmupMode = isWarmup;
        warmupSeconds = warmupMin * 60;
        timerDisplay.style.display = 'block';
        
        engineTimer = setInterval(() => {
            if (!isEngineRunning) {
                stopTimer();
                return;
            }
            let elapsed;
            if (isWarmupMode) {
                elapsed = Math.floor((Date.now() - engineStartTime) / 1000);
                const remaining = Math.max(0, warmupSeconds - elapsed);
                timerDisplay.textContent = `🌡️ ПРОГРЕВ: ${formatTime(remaining)}`;
                if (remaining <= 0) {
                    sendCommand('engine/state', 'OFF');
                    stopTimer();
                    showNotification('Прогрев завершён, двигатель заглушен');
                }
            } else {
                elapsed = Math.floor((Date.now() - engineStartTime) / 1000);
                timerDisplay.textContent = `⏱️ ВРЕМЯ РАБОТЫ: ${formatTime(elapsed)}`;
            }
        }, 1000);
    }

    function stopTimer() {
        if (engineTimer) {
            clearInterval(engineTimer);
            engineTimer = null;
        }
        timerDisplay.style.display = 'none';
    }

    function updateScheduleList() {
        scheduleList.innerHTML = '';
        if (scheduledItems.length === 0) {
            scheduleList.innerHTML = '<div style="color:#aaa; padding:10px; text-align:center;">Нет запланированных запусков</div>';
            return;
        }
        scheduledItems.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'schedule-item';
            div.innerHTML = `
                <span class="schedule-time">⏰ ${item.timeStr}</span>
                <button class="schedule-cancel" data-index="${index}">Отменить</button>
            `;
            scheduleList.appendChild(div);
        });
        document.querySelectorAll('.schedule-cancel').forEach(btn => {
            animateDynamicButton(btn);
            btn.addEventListener('click', (e) => {
                const idx = parseInt(e.target.getAttribute('data-index'));
                cancelSchedule(idx);
            });
        });
    }

    function cancelSchedule(index) {
        const item = scheduledItems[index];
        if (item && item.timer) {
            clearTimeout(item.timer);
        }
        scheduledItems.splice(index, 1);
        scheduledTimers.splice(index, 1);
        updateScheduleList();
        showNotification('Запланированный запуск отменён');
        sendCommand('engine/schedule', 'CANCEL');
    }

    function scheduleEngineStart(dt) {
        const now = Date.now();
        const delay = dt.getTime() - now;
        if (delay <= 0) {
            alert('Выберите время в будущем');
            return false;
        }
        const timer = setTimeout(() => {
            sendCommand('engine/state', 'ON');
            showNotification(`Запуск выполнен в ${dt.toLocaleString()}`);
            const idx = scheduledItems.findIndex(i => i.time.getTime() === dt.getTime());
            if (idx !== -1) {
                scheduledItems.splice(idx, 1);
                scheduledTimers.splice(idx, 1);
                updateScheduleList();
            }
        }, delay);
        scheduledTimers.push(timer);
        scheduledItems.push({
            time: dt,
            timeStr: dt.toLocaleString(),
            timer: timer
        });
        updateScheduleList();
        showNotification(`Запуск запланирован на ${dt.toLocaleString()}`);
        return true;
    }

    function initMap() {
        const mapContainer = document.getElementById('map-container');
        if (!mapContainer) return;
        mapContainer.innerHTML = '<div id="leaflet-map" style="height: 100%; width: 100%;"></div>';
        map = L.map('leaflet-map').setView([55.751244, 37.618423], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '',
            subdomains: 'abcd',
            minZoom: 0,
            maxZoom: 20
        }).addTo(map);
        map.attributionControl.setPrefix(false);
        marker = L.marker([55.751244, 37.618423]).addTo(map);
    }

    function updateMapPosition(lat, lon) {
        if (map && marker && lat && lon) {
            map.setView([lat, lon], 15);
            marker.setLatLng([lat, lon]);
        }
    }

    function addToHistory(lat, lon) {
        if (!lat || !lon) return;
        const time = new Date().toLocaleTimeString();
        historyCoords.unshift({ time, lat, lon });
        if (historyCoords.length > 10) historyCoords.pop();
        const historyList = document.getElementById('historyList');
        if (historyList) historyList.innerHTML = historyCoords.map(h => `<div class="history-item">${h.time} | ${h.lat.toFixed(6)}, ${h.lon.toFixed(6)}</div>`).join('');
        if (historyCoords.length === 0 && historyList) historyList.innerHTML = '<div class="history-item">Нет данных</div>';
    }

    function showNotification(msg) { if ('Notification' in window && Notification.permission === 'granted') new Notification('Lexus Control', { body: msg, icon: 'icon-lexus.png' }); }
    
    function updateMainButton(isRunning) {
        isEngineRunning = isRunning;
        if (isRunning) { 
            mainEngineBtn.textContent = '🛑 СТОП'; 
            mainEngineBtn.classList.remove('start'); 
            mainEngineBtn.classList.add('stop');
            const speed = parseFloat(document.getElementById('speed').innerText);
            if (speed > 5) {
                mainEngineBtn.disabled = true;
                mainEngineBtn.style.opacity = '0.5';
            } else {
                mainEngineBtn.disabled = false;
                mainEngineBtn.style.opacity = '1';
            }
        } else { 
            mainEngineBtn.textContent = '🔥 СТАРТ'; 
            mainEngineBtn.classList.remove('stop'); 
            mainEngineBtn.classList.add('start');
            mainEngineBtn.disabled = false;
            mainEngineBtn.style.opacity = '1';
            stopTimer();
        }
    }
    
    function updateArmButton(armed) {
        isArmed = armed;
        btnArmDisarm.textContent = armed ? '🔓 СНЯТЬ С ОХРАНЫ' : '🔒 ПОСТАВИТЬ НА ОХРАНУ';
        document.getElementById('securityStatus').innerHTML = armed ? '🔒 ВКЛЮЧЕНА' : '🔓 ВЫКЛЮЧЕНА';
    }

    function sendCommand(topic, command) {
        if (client && client.connected) {
            const fullTopic = currentPrefix ? `${currentPrefix}/${topic}` : topic;
            client.publish(fullTopic, command, { qos: 1, retain: false });
            console.log(`📤 ${fullTopic} = ${command}`);
            return true;
        } else { alert('Нет подключения к MQTT'); return false; }
    }

    function connectMQTT(host, port, user, pass, prefix) {
        currentPrefix = prefix;
        const wsUrl = `wss://${host}:${port}/mqtt`;
        const options = { username: user, password: pass, clientId: "pwa_" + Math.random().toString(36).substring(7), clean: true, reconnectPeriod: 5000, connectTimeout: 30000 };
        client = mqtt.connect(wsUrl, options);
        client.on('connect', () => {
            connStatusDiv.textContent = '✅ Подключено к MQTT';
            connStatusDiv.style.color = '#4ade80';
            const topics = [`${prefix}/gps/latitude`, `${prefix}/gps/longitude`, `${prefix}/gps/speed`, `${prefix}/engine/status`, `${prefix}/ready/status`, `${prefix}/engine/rpm`, `${prefix}/engine/temp`, `${prefix}/doors/status`, `${prefix}/security/status`];
            client.subscribe(topics);
        });
        client.on('message', (topic, message) => {
            const payload = message.toString();
            const shortTopic = topic.replace(`${currentPrefix}/`, '');
            switch(shortTopic) {
                case 'gps/latitude': lastLat = parseFloat(payload); document.getElementById('coords').innerHTML = (lastLat?.toFixed(6) || '—') + ' / ' + (lastLon?.toFixed(6) || '—'); break;
                case 'gps/longitude': lastLon = parseFloat(payload); document.getElementById('coords').innerHTML = (lastLat?.toFixed(6) || '—') + ' / ' + lastLon.toFixed(6); addToHistory(lastLat, lastLon); updateMapPosition(lastLat, lastLon); break;
                case 'gps/speed': 
                    const speed = parseFloat(payload);
                    document.getElementById('speed').innerHTML = speed.toFixed(1) + ' км/ч';
                    if (isEngineRunning && speed > 5) {
                        mainEngineBtn.disabled = true;
                        mainEngineBtn.style.opacity = '0.5';
                    } else if (isEngineRunning) {
                        mainEngineBtn.disabled = false;
                        mainEngineBtn.style.opacity = '1';
                    }
                    break;
                case 'engine/status': 
                    updateMainButton(payload === 'running');
                    if (payload === 'running') {
                        startTimer(false, 0);
                    } else {
                        stopTimer();
                    }
                    break;
                case 'ready/status': document.getElementById('readyStatus').innerHTML = payload === 'ready' ? '✅ READY' : '❌ OFF'; break;
                case 'engine/rpm': document.getElementById('rpm').innerHTML = payload + ' об/мин'; break;
                case 'engine/temp': document.getElementById('temp').innerHTML = payload + ' °C'; break;
                case 'doors/status': document.getElementById('doors').innerHTML = payload; break;
                case 'security/status': updateArmButton(payload === 'armed'); break;
            }
        });
        client.on('error', (err) => { console.error('MQTT error:', err); connStatusDiv.textContent = '❌ Ошибка MQTT'; connStatusDiv.style.color = '#f87171'; });
        client.on('close', () => { console.log('MQTT disconnected'); connStatusDiv.textContent = '⚠️ Отключено, переподключение...'; connStatusDiv.style.color = '#fbbf24'; });
    }

    function showConfig() {
        mqttConfigPanel.style.display = 'block';
        mainInterface.style.display = 'none';
        if (client) { client.end(); client = null; }
    }

    function loadSettings() {
        const host = localStorage.getItem('mqtt_host');
        if (host) {
            mqttHost.value = host;
            mqttPort.value = localStorage.getItem('mqtt_port') || '19608';
            mqttUser.value = localStorage.getItem('mqtt_user') || '';
            mqttPass.value = localStorage.getItem('mqtt_pass') || '';
            mqttPrefix.value = localStorage.getItem('mqtt_prefix') || 'lexus';
            mqttConfigPanel.style.display = 'none';
            mainInterface.style.display = 'block';
            connectMQTT(mqttHost.value, mqttPort.value, mqttUser.value, mqttPass.value, mqttPrefix.value);
            initMap();
        } else { showConfig(); }
    }

    saveMqttBtn.addEventListener('click', () => {
        localStorage.setItem('mqtt_host', mqttHost.value);
        localStorage.setItem('mqtt_port', mqttPort.value);
        localStorage.setItem('mqtt_user', mqttUser.value);
        localStorage.setItem('mqtt_pass', mqttPass.value);
        localStorage.setItem('mqtt_prefix', mqttPrefix.value);
        loadSettings();
    });

    // --- Обработчики ---
    mainEngineBtn.addEventListener('click', () => sendCommand('engine/state', isEngineRunning ? 'OFF' : 'ON'));
    btnCloseWindows.addEventListener('click', () => sendCommand('engine/state', 'CLOSE_WINDOWS'));
    btnArmDisarm.addEventListener('click', () => {
        if (btnArmDisarm.textContent.includes('ПОСТАВИТЬ')) {
            sendCommand('engine/state', 'ARM');
        } else {
            sendCommand('engine/state', 'DISARM');
        }
    });
    btnStartWarmup.addEventListener('click', () => {
        const minutes = parseInt(warmupTime.value);
        startTimer(true, minutes);
        sendCommand('engine/state', `WARMUP_${minutes}`);
        warmupPanel.classList.remove('active');
        showNotification(`Запущен прогрев на ${minutes} минут`);
    });
    btnScheduleToggle.addEventListener('click', () => {
        scheduleModal.style.display = 'flex';
    });
    confirmScheduleBtn.addEventListener('click', () => {
        const dt = new Date(scheduleDateTime.value);
        if (dt && dt > new Date()) {
            scheduleEngineStart(dt);
            scheduleModal.style.display = 'none';
            scheduleDateTime.value = '';
        } else {
            alert('Выберите дату и время в будущем');
        }
    });
    closeModalBtn.addEventListener('click', () => {
        scheduleModal.style.display = 'none';
    });
    btnWarmupToggle.addEventListener('click', () => { warmupPanel.classList.toggle('active'); });
    btnClearHistory.addEventListener('click', () => { historyCoords = []; const list = document.getElementById('historyList'); if (list) list.innerHTML = '<div class="history-item">Нет данных</div>'; });
    settingsBtn.addEventListener('click', showConfig);
    imageBtn.addEventListener('click', () => imageModal.style.display = 'flex');
    closeModal.addEventListener('click', () => imageModal.style.display = 'none');
    saveImageBtn.addEventListener('click', () => { if (imageUpload.files[0]) { const reader = new FileReader(); reader.onload = (e) => { carImage.src = e.target.result; localStorage.setItem('carImage', e.target.result); }; reader.readAsDataURL(imageUpload.files[0]); } imageModal.style.display = 'none'; });

    const savedImage = localStorage.getItem('carImage');
    if (savedImage) carImage.src = savedImage;
    if ('Notification' in window && Notification.permission !== 'granted') Notification.requestPermission();

    window.onload = loadSettings;
</script>
</body>
</html>
